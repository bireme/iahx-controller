services:
  iahx_controller:
    container_name: iahx-controller
    build:
      context: .
      target: dev
    restart: unless-stopped
    env_file:
      '.env'
    volumes:
      - ./controller:/app
    ports:
      - ${APP_PORT}:8000
    networks:
      - nginx-proxy

  iahx_controller_cache:
    image: redis:7.2-alpine
    container_name: iahx-controller-cache
    restart: unless-stopped
    ports:
      - 6379:6379
    volumes:
      - ./redis_data:/data
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_AOF_ENABLED=no
      - TZ=${TIMEZONE}
    command:  redis-server --maxmemory ${APP_CACHE_MEMORY} --maxmemory-policy allkeys-lru
    networks:
      - nginx-proxy

networks:
  nginx-proxy:
      external: true
